<!DOCTYPE html>
<html>

<head>
  <title>Contact Us - Amusic</title>
  <link rel="stylesheet" href="/client/src/css/Contact.css">
</head>

<body>
  <nav>
    <ul>
      <li><a href="/client/src/html/Home.html">Home</a></li>
      <li><a href="/client/src/html/Music.html">Services</a></li>
      <li><a href="/client/src/html/Contact.html">Contact</a></li>
      <li><a href="/client/src/html/About.html">About</a></li>
    </ul>
  </nav>
  <header>
    <h1>Contact Us</h1>
  </header>

  <main>
    <section>
      <h2>Get in Touch</h2>
      <p>Have a question, feedback, or need support? Fill out the form below, and we'll get back to you as soon as
        possible.</p>
    </section>

    <section>
      <h2>Contact Form</h2>
      <form>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Enter your message" required></textarea>
        </div>
        <button type="submit"><a href="thankyou.html">Submit</a></button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2023 Amusic. All rights reserved.</p>
  </footer>
</body>

</html>
